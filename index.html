<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Vibra Alto · Velas Artesanales</title>

  </head>

  <body>
 <header>
  <nav class="nav">
    <a href="index.html" class="nav__logo">Vibra Alto</a>
    <ul class="nav__links">
      <li><a href="index.html" aria-current="page">Inicio</a></li>
      <li><a href="pages/contacto.html">Contacto</a></li>
    </ul>
  </nav>
</header>


    <main>

      <section class="hero__tienda">
        <h2>✦ Nuestros productos ✦</h2>

        <div class="contenedor-tarjetas">

          <article class="card">
            <img src="./img/products/1_velas.jpg" alt="Vela blanca en vaso">
            <h3>Vela blanca</h3>
            <p>Vela blanca en vaso</p>
            <p>$1200</p>
            <button class="btn btn--primary">Agregar al carrito</button>
          </article>

          <article class="card">
            <img src="./img/products/2_velas.jpg" alt="Dos velas blancas en vasos">
            <h3>Velas blancas</h3>
            <p>Dos Velas blanca en vasos</p>
            <p>$1800</p>
            <button class="btn btn--primary">Agregar al carrito</button>
          </article>

          <article class="card">
            <img src="./img/products/3_velas.jpg" alt="Vela blanca en vaso con varios pabilones">
            <h3>Vela blanca</h3>
            <p>Vela blanca con 3 pabilones</p>
            <p>$1400</p>
            <button class="btn btn--primary">Agregar al carrito</button>
          </article>

          <article class="card">
            <img src="./img/products/4_velas.jpg" alt="Cuatro velas en vaso">
            <h3>Velas blancas</h3>
            <p>Cuatro velas blancas en vaso</p>
            <p>$2200</p>
            <button class="btn btn--primary">Agregar al carrito</button>
          </article>



        </div>
      </section>
    </main>
    
    
    <footer>
      <p class="footer__tagline">Cada vela, un momento de luz.</p>
      <nav>
        <ul class="footer__list">
          <li><img src="./img/whatsapp.png" alt="logo de whatsapp" /></li>
          <li><img src="./img/instagram.png" alt="logo de instagram" /></li>
        </ul>
      </nav>

    </footer>
  </body>



</html>
